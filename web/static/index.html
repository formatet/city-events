<style>
@font-face {
  font-family: 'Inter';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('fonts/inter-400-latin-ext.woff2') format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
}
@font-face {
  font-family: 'Inter';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('fonts/inter-400-latin.woff2') format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}

table {
  table-layout: auto;
  width: 100%;
  border-collapse: collapse;
  margin: 0 auto;
}
td {
  padding: 0.3em;
}
th:nth-child(1), td:nth-child(1) { 
  width: auto;
  white-space: nowrap;
}
th:nth-child(2), td:nth-child(2) {
  width: 50%;
}
th:nth-child(3), td:nth-child(3) { 
  width: auto;
  white-space: normal; /* Tillåt wrapping på Var */
  max-width: 15em; /* Max ~"Konstepidemin Scen" */
}
th:nth-child(4), td:nth-child(4) { 
  width: 1%; /* Smal som möjligt */
  white-space: nowrap;
  padding-left: 0.5em;
  padding-right: 0.5em;
}
body {
  font-family: 'Inter', sans-serif;
  font-size: clamp(16px, 2.5vw, 18px);
  line-height: 1.6;
  margin: 1rem;
  transition: background-color 0.5s ease, color 0.5s ease;
}

/* Mobile optimizations */
@media (max-width: 767px) {
  body {
    font-size: 15px;
    margin: 0.25rem;
  }
  
  table {
    font-size: 14px;
    table-layout: fixed;
  }
  
  thead th {
    font-size: 15px;
    font-weight: 600;
    padding: 0.4em 0.15em;
  }
  
  /* Tightare kolumnbredder - allt måste få plats */
  th:nth-child(1), td:nth-child(1) { 
    width: 24%;
    white-space: normal;
  }
  th:nth-child(2), td:nth-child(2) {
    width: 38%;
    white-space: normal; /* Tillåt wrapping på titlar */
    overflow: visible;
    text-overflow: clip;
  }
  th:nth-child(3), td:nth-child(3) { 
    width: 23%;
    max-width: 23%;
  }
  th:nth-child(4), td:nth-child(4) { 
    width: 15%;
    max-width: 15%;
  }
  
  /* Ellipsis bara på Var och Konst */
  td:nth-child(3), td:nth-child(4) {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  /* Liten padding för att spara plats */
  td {
    padding: 0.3em 0.15em;
  }
  
  /* Zebra striping även på mobil */
  tbody tr:nth-child(even) {
    background-color: rgba(0, 0, 0, 0.05);
  }
}

body.theme-night tbody tr:nth-child(even) {
  background-color: rgba(255, 255, 255, 0.05);
}
body.theme-day {
  background-color: #fff;
  color: #000;
}
body.theme-transition {
  background-color: #1a1a1a;
  color: #e0e0e0;
}
body.theme-transition thead th {
  background: #1a1a1a;
  color: #e0e0e0;
}
tr:nth-child(even) {
  background-color: rgba(0, 0, 0, 0.05);
}
/* Pride-läge pastell: svaga regnbågstoner, behagliga för ögat */
body.theme-pride-pastel tbody tr { background-color: transparent !important; }
body.theme-pride-pastel tbody tr:nth-child(6n+1) { background-color: #fde8e8 !important; }
body.theme-pride-pastel tbody tr:nth-child(6n+2) { background-color: #fef0e0 !important; }
body.theme-pride-pastel tbody tr:nth-child(6n+3) { background-color: #fdfae0 !important; }
body.theme-pride-pastel tbody tr:nth-child(6n+4) { background-color: #e4f5e4 !important; }
body.theme-pride-pastel tbody tr:nth-child(6n+5) { background-color: #e0ebff !important; }
body.theme-pride-pastel tbody tr:nth-child(6n)   { background-color: #eddff5 !important; }
body.theme-night.theme-pride-pastel tbody tr:nth-child(6n+1) { background-color: rgba(228,3,3,0.07) !important; }
body.theme-night.theme-pride-pastel tbody tr:nth-child(6n+2) { background-color: rgba(255,140,0,0.07) !important; }
body.theme-night.theme-pride-pastel tbody tr:nth-child(6n+3) { background-color: rgba(255,237,0,0.06) !important; }
body.theme-night.theme-pride-pastel tbody tr:nth-child(6n+4) { background-color: rgba(0,128,38,0.07) !important; }
body.theme-night.theme-pride-pastel tbody tr:nth-child(6n+5) { background-color: rgba(0,77,255,0.07) !important; }
body.theme-night.theme-pride-pastel tbody tr:nth-child(6n)   { background-color: rgba(117,7,135,0.08) !important; }
body.theme-transition.theme-pride-pastel tbody tr:nth-child(6n+1) { background-color: rgba(228,3,3,0.07) !important; }
body.theme-transition.theme-pride-pastel tbody tr:nth-child(6n+2) { background-color: rgba(255,140,0,0.07) !important; }
body.theme-transition.theme-pride-pastel tbody tr:nth-child(6n+3) { background-color: rgba(255,237,0,0.06) !important; }
body.theme-transition.theme-pride-pastel tbody tr:nth-child(6n+4) { background-color: rgba(0,128,38,0.07) !important; }
body.theme-transition.theme-pride-pastel tbody tr:nth-child(6n+5) { background-color: rgba(0,77,255,0.07) !important; }
body.theme-transition.theme-pride-pastel tbody tr:nth-child(6n)   { background-color: rgba(117,7,135,0.08) !important; }


/* Highlight-varianter för manuellt uppmärksammade events */
tr.variant-leftborder td:first-child {
  border-left: 3px solid #c9a961;
}
tr.variant-background {
  background-color: #fffdf5 !important;
}
body.theme-night tr.variant-background,
body.theme-transition tr.variant-background {
  background-color: rgba(201, 169, 97, 0.08) !important;
}
table a {
  color: inherit;
  text-decoration: underline;
}
table a:visited { 
  color: inherit; 
}
a { color: #a3e4ff; text-decoration: none; }
a:hover { text-decoration: underline; }
.filter-icon {
  opacity: 0;
  width: 1em;
  height: 1em;
  display: inline-block;
  pointer-events: none;
  transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: opacity;
  vertical-align: middle;
  margin-left: 0.3em;
}
.filter-icon.visible {
  opacity: 1;
  pointer-events: auto;
}
.has-icon {
  display: inline-flex;
  align-items: center;
  gap: 0.25em;
  justify-content: flex-start;
}
.event-title-text {
  display: inline;
}
.event-icon {
  display: inline;
  margin-left: 0.3em;
}
#intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  color: inherit;
  opacity: 1;
  transition: opacity 0.5s ease;
  pointer-events: auto;
}
@media (max-width: 767px) {
  #intro {
    align-items: flex-start;
    padding-top: 25vh;
  }
}
#intro.fading-out {
  opacity: 0;
  pointer-events: none;
}
#main-content {
  opacity: 0;
  transition: opacity 0.5s ease;
}
#main-content.visible {
  opacity: 1;
  pointer-events: auto;
  user-select: auto;
}
#start-icon {
  display: block;
  width: clamp(5rem, 20vw, 20rem);
  margin: 2rem auto;
  transition: opacity 1s ease;
  max-width: 80vw;
  max-height: 80vh;
  color: inherit;
  cursor: pointer;
}
#start-icon:hover { transform: scale(1.1); }
#start-icon svg {
  color: inherit;
  fill: currentColor;
  stroke: currentColor;
  transition: fill 0.5s ease, stroke 0.5s ease;
}
tbody .filter-icon,
tbody .filter-icon svg {
  width: 1.25em;
  height: 1.25em;
}
body.theme-night {
  background-color: #000;
  color: #fff;
}
body.theme-night .filter-icon svg {
  fill: #fff;
  stroke: #fff;
}
body.theme-night thead th {
  background: #000;
  color: #fff;
}
body.theme-night tr:nth-child(even) {
  background-color: rgba(255, 255, 255, 0.05);
}
thead th {
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  padding: 0.3em 0.3em;
  font-weight: bold;
  text-align: left;
  vertical-align: top;
  line-height: 1.2;
}  
thead .filter-icon {
  width: 1.25em;
  height: 1.25em;
}
thead .filter-icon svg {
  width: 1.25em;
  height: 1.25em;
}
thead .has-icon {
  align-items: center;
}
thead .filter-icon {
  vertical-align: middle;
}
.venue-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}
.om-link {
  font-weight: normal;
  font-size: 0.85em;
  opacity: 0.45;
  text-decoration: none;
  color: inherit;
  white-space: nowrap;
  margin-left: 0.5em;
}
.om-link:hover {
  opacity: 0.8;
  text-decoration: underline;
}
#header-date {
  cursor: pointer;
  user-select: none;
}
#header-date:hover .date-header-label {
  text-decoration: underline;
}
.date-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 3px;
  width: 210px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.13);
  z-index: 200;
  padding: 0.2em 0;
}
.date-dropdown.open {
  display: block;
}
.date-dropdown-item {
  display: block;
  padding: 0.35em 0.75em;
  cursor: pointer;
  white-space: nowrap;
  color: inherit;
  text-decoration: none;
}
.date-dropdown-item:hover {
  background: rgba(0,0,0,0.06);
  text-decoration: none;
}
.date-dropdown-item.active {
  font-weight: bold;
}
body.theme-night .date-dropdown,
body.theme-transition .date-dropdown {
  background: #0d0d0d;
  border-color: rgba(255,255,255,0.1);
}
body.theme-night .date-dropdown-item:hover,
body.theme-transition .date-dropdown-item:hover {
  background: rgba(255,255,255,0.06);
}
#feed-end td { padding: 0; border: none; }
#feed-end-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 1.5rem;
  opacity: 0;
  animation: feedEndFadeIn 0.8s ease forwards;
}
@keyframes feedEndFadeIn { to { opacity: 1; } }
#feed-end-icon {
  display: block;
  width: clamp(5rem, 20vw, 20rem);
  max-width: 80vw;
}
#feed-end-icon svg { color: inherit; }
#feed-end-text { font-size: 0.9em; text-align: center; max-width: min(80vw, 28rem); display: flex; flex-direction: column; gap: 0.4em; }
.feed-end-dim { opacity: 0.55; }
.feed-end-venue { display: block; text-align: center; }
.feed-quote-t { opacity: 0.85; }
.feed-quote-a { font-size: 0.8em; opacity: 0.45; margin-top: 0.3em; }
</style>

</head>
